<!DOCTYPE html>
<html>
<head>
  <title>Amafoto yanje</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
    }

    h1 {
      background: #007bff;
      color: white;
      padding: 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>Amafoto yanje 📸</h1>

<div class="gallery">

  <img src="1.jpg">
  <img src="2.jpg">
  <img src="3.jpg">

  <img src="4.jpg">
  <img src="5.jpg">
  <img src="6.jpg">

  <img src="7.jpg">
  <img src="8.jpg">
  <img src="9.jpg">

</div>

</body>
</html>
